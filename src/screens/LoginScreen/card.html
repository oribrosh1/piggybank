<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>CreditKid Parent Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#d9e3f6",
                        "surface-container-highest": "#d9e3f6",
                        "tertiary-container": "#956e00",
                        "surface-container-low": "#eff4ff",
                        "on-primary-container": "#fffbff",
                        "on-background": "#121c2a",
                        "surface": "#f8f9ff",
                        "surface-container-lowest": "#ffffff",
                        "tertiary": "#765700",
                        "on-secondary-fixed-variant": "#005236",
                        "on-secondary-container": "#00714d",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#e9ddff",
                        "secondary-fixed-dim": "#4edea3",
                        "on-tertiary-container": "#fffbff",
                        "surface-container": "#e6eeff",
                        "secondary-fixed": "#6ffbbe",
                        "on-surface": "#121c2a",
                        "on-tertiary-fixed": "#261a00",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#23005c",
                        "inverse-surface": "#27313f",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed": "#002113",
                        "inverse-primary": "#d0bcff",
                        "tertiary-fixed-dim": "#f9bd22",
                        "secondary": "#006c49",
                        "on-tertiary": "#ffffff",
                        "surface-container-high": "#dee9fc",
                        "surface-tint": "#6d3bd7",
                        "inverse-on-surface": "#eaf1ff",
                        "background": "#f8f9ff",
                        "outline": "#7b7486",
                        "on-primary": "#ffffff",
                        "primary": "#6b38d4",
                        "on-surface-variant": "#494454",
                        "on-tertiary-fixed-variant": "#5c4300",
                        "primary-container": "#8455ef",
                        "primary-fixed-dim": "#d0bcff",
                        "tertiary-fixed": "#ffdf9f",
                        "secondary-container": "#6cf8bb",
                        "surface-dim": "#d0dbed",
                        "outline-variant": "#cbc3d7",
                        "on-primary-fixed-variant": "#5516be",
                        "surface-bright": "#f8f9ff",
                        "on-error": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        h1,
        h2,
        h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* High-Fidelity Animations */
        @keyframes float-ambient {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(5deg);
            }

            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }

        @keyframes float-ambient-alt {
            0% {
                transform: translateY(0px) rotate(0deg) scale(1);
            }

            50% {
                transform: translateY(15px) rotate(-8deg) scale(1.05);
            }

            100% {
                transform: translateY(0px) rotate(0deg) scale(1);
            }
        }

        @keyframes float-rotate {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            33% {
                transform: translate(15px, -15px) rotate(120deg);
            }

            66% {
                transform: translate(-10px, 10px) rotate(240deg);
            }

            100% {
                transform: translate(0, 0) rotate(360deg);
            }
        }

        @keyframes card-glow {
            0% {
                box-shadow: 0 8px 32px rgba(107, 56, 212, 0.08);
            }

            50% {
                box-shadow: 0 8px 48px rgba(107, 56, 212, 0.18);
            }

            100% {
                box-shadow: 0 8px 32px rgba(107, 56, 212, 0.08);
            }
        }

        @keyframes slideUpFade {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes revealCheck {
            0% {
                transform: scale(0) rotate(-45deg);
                opacity: 0;
            }

            60% {
                transform: scale(1.2) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .animate-float {
            animation: float-ambient 8s ease-in-out infinite;
        }

        .animate-float-slow {
            animation: float-ambient-alt 12s ease-in-out infinite;
        }

        .animate-kinetic {
            animation: float-rotate 20s linear infinite;
        }

        .animate-slide-up {
            animation: slideUpFade 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
        }

        .animate-glow-pulse {
            animation: card-glow 4s ease-in-out infinite;
        }

        .animate-reveal-check {
            animation: revealCheck 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            animation-delay: 1.2s;
            opacity: 0;
        }

        .stagger-1 {
            animation-delay: 0.1s;
        }

        .stagger-2 {
            animation-delay: 0.25s;
        }

        .stagger-3 {
            animation-delay: 0.4s;
        }

        .spring-transition {
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .glass-card-dark {
            background: rgba(239, 244, 255, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .floating-3d-element {
            position: absolute;
            pointer-events: none;
            z-index: 0;
        }

        .shape-sphere {
            border-radius: 50%;
            box-shadow: inset -10px -10px 20px rgba(0, 0, 0, 0.1), 10px 20px 30px rgba(0, 0, 0, 0.15);
        }

        .shape-cube {
            border-radius: 20%;
            box-shadow: 10px 20px 30px rgba(0, 0, 0, 0.12);
        }

        .shape-torus {
            border: 20px solid currentColor;
            border-radius: 50%;
            background: transparent;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .shape-pyramid {
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 100px solid currentColor;
            filter: drop-shadow(10px 15px 15px rgba(0, 0, 0, 0.1));
        }

        .shape-abstract {
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            box-shadow: 10px 20px 40px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body class="bg-surface text-on-surface min-h-screen pb-32 relative overflow-x-hidden">
 
</body>

</html>
